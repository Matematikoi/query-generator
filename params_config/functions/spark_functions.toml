MapContainsKey = "SELECT MAP_CONTAINS_KEY(MAP('a', 1, 'b', 2), 'a') AS has_a LIMIT 5"
StrToMap = "SELECT STR_TO_MAP('a:1,b:2', ',', ':') AS m LIMIT 5"


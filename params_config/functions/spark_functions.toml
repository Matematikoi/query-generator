MD5 = "SELECT MD5(c_last_name) AS md5_name FROM customer LIMIT 5"
SHA2 = "SELECT SHA2(c_last_name, 256) AS sha256_name FROM customer LIMIT 5"
SHA = "SELECT SHA(c_last_name) AS sha1_name FROM customer LIMIT 5"
Hash = "SELECT HASH(c_last_name) AS hash_val FROM customer LIMIT 5"

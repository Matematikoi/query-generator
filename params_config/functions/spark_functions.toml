[scalar.session_system]
CurrentUser = "SELECT CURRENT_USER AS cur_user LIMIT 5"
CurrentSchema = "SELECT CURRENT_SCHEMA() AS cur_schema LIMIT 5"
Uuid = "SELECT UUID() AS uid LIMIT 5"

[conditional.case]

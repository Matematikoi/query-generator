## SparkSQL Rules
## Document 1 — SparkSQL Syntax Rules

### RULE 1: Window Function with GROUP BY
When a query has both GROUP BY and a window function, the window function argument cannot reference a raw column. Wrap it in an inner aggregate first.

```
BAD:  SUM(col)          OVER (PARTITION BY g ORDER BY o)
GOOD: SUM(SUM(col))     OVER (PARTITION BY g ORDER BY o)
```

Applies to all window functions. For NTH_VALUE, LAG, LEAD, etc.:
```
BAD:  NTH_VALUE(col, 2) OVER (...)
GOOD: NTH_VALUE(MAX(col), 2) OVER (...)
```

---

### RULE 2: Non-Aggregated Scalar Expressions Alongside Aggregates
If any aggregate (COUNT, SUM, MAX, etc.) appears in SELECT, every other expression referencing a column must also be an aggregate or a GROUP BY key. This applies even when the column is wrapped in a scalar function.

```
BAD:  SELECT COUNT(*), ELEMENT_AT(ARRAY(col1, col2), 1) FROM t
GOOD: SELECT COUNT(*), ELEMENT_AT(ARRAY(MAX(col1), MAX(col2)), 1) FROM t
GOOD: SELECT COUNT(*), ELEMENT_AT(ARRAY(1, 2, 3), 1) FROM t  -- constants are OK
```

Applies to: ELEMENT_AT, CONTAINS, ARRAY(), WIDTH_BUCKET, REPEAT, NAMED_STRUCT, CONCAT_WS, MAP_ENTRIES, and any scalar function wrapping a raw column.

---

### RULE 3: NVL2 and Other Scalar Functions on Non-Grouped Columns
NVL2, IF, and COALESCE applied directly to a raw column are treated as non-aggregated expressions in a GROUP BY query. Wrap the column argument in an aggregate.

```
BAD:  NVL2(col, 'yes', 'no')
GOOD: NVL2(MAX(col), 'yes', 'no')
```

Applies to any GROUP BY variant including ROLLUP and CUBE.

---

### RULE 4: JOIN Ordering — No Forward References
In explicit JOIN syntax, a table alias is only in scope after it is introduced. You cannot reference an alias in an ON clause of a JOIN that appears before the alias is defined.

```
BAD:
  FROM a
  JOIN b ON c.id = b.id      -- c is not yet defined
  JOIN c ON c.fk = a.pk

GOOD:
  FROM a
  JOIN c ON c.fk = a.pk      -- c is defined here
  JOIN b ON c.id = b.id      -- c is now in scope
```

---

### RULE 5: Casting Date Surrogate Keys (BIGINT to DATE)
TPC-DS `*_date_sk` columns are BIGINT surrogate keys, not DATE types. `CAST(bigint AS DATE)` is rejected. Any date/time function (DATE_TRUNC, DATE_ADD, etc.) requires `DATE_FROM_UNIX_DATE()` conversion first.

```
BAD:  CAST(wr_returned_date_sk AS DATE)
BAD:  DATE_TRUNC('month', CAST(ss_sold_date_sk AS STRING))
GOOD: DATE_FROM_UNIX_DATE(wr_returned_date_sk)
GOOD: DATE_TRUNC('month', DATE_FROM_UNIX_DATE(ss_sold_date_sk))
```

Columns that are actual DATE types (e.g., d_date, i_rec_start_date) can be cast normally:
```
GOOD: CAST(d.d_date AS TIMESTAMP)
```

---

### RULE 6: FORMAT_NUMBER Output Cannot Be Cast to Numeric
FORMAT_NUMBER returns a STRING with locale-formatted commas (e.g., '1,234.56'). Casting that string to DOUBLE or DECIMAL fails due to the comma separator.

```
BAD:  CAST(FORMAT_NUMBER(SUM(col), 2) AS DOUBLE) > 0
GOOD: SUM(col) > 0
GOOD: TRY_CAST(REPLACE(FORMAT_NUMBER(SUM(col), 2), ',', '') AS DOUBLE)
```

---

### RULE 7: STRUCT Field Names Must Match Across ARRAY Elements
SparkSQL derives struct field names from expression names. If two STRUCT() literals produce different field names, ARRAY() rejects them with a DATA_DIFF_TYPES error. Use named_struct() with explicit, consistent field names.

```
BAD:
  ARRAY(
    STRUCT('k1', col_a),               -- fields: col1, col_a
    STRUCT('k2', COALESCE(col_b, 'x')) -- fields: col1, col2  <- mismatch
  )

GOOD:
  ARRAY(
    named_struct('key', 'k1', 'val', col_a),
    named_struct('key', 'k2', 'val', COALESCE(col_b, 'x'))
  )
```

Required when building the ARRAY input for MAP_FROM_ENTRIES.

---

### RULE 8: Semijoin Subqueries Must Be Selective
An IN (SELECT ...) semijoin on a large fact table with no WHERE clause will cause a query timeout. Always add a selective filter to the subquery.

```
BAD:  WHERE i.i_item_sk IN (SELECT ss_item_sk FROM store_sales)

GOOD: WHERE i.i_item_sk IN (
        SELECT ss_item_sk FROM store_sales
        WHERE ss_net_paid > 0
          AND ss_sold_date_sk BETWEEN 2451000 AND 2452000
      )
```

---

### RULE 9: Non-Deterministic Functions Cannot Be Arguments to Aggregates
SparkSQL forbids non-deterministic expressions (RANDN(), RAND(), RANDOM(), UUID()) inside aggregate functions (SUM, AVG, MIN, MAX, COUNT, etc.). The error is AGGREGATE_FUNCTION_WITH_NONDETERMINISTIC_EXPRESSION.

```
BAD:  SUM(RANDN(42) * col)
BAD:  AVG(RAND() + col)
BAD:  AVG(CASE WHEN ... THEN col * (1 + RANDN(99) * 0.01) ... END)

GOOD: SUM(col)                     -- aggregate only deterministic expressions
GOOD: RANDN(42) AS noise           -- use non-deterministic in scalar position only
```

---

### RULE 10: LATERAL VIEW Column Reference Must Use Defined Alias
In LATERAL VIEW, columns are accessible by their bare column alias or the table alias prefix — not by a different prefix.

```
Syntax: LATERAL VIEW POSEXPLODE(arr) table_alias AS col1, col2

BAD:  SUM(pe.pos)          -- 'pe' is not the defined table alias
GOOD: SUM(pos)             -- bare column name
GOOD: SUM(pe_table.pos)    -- correct table alias prefix
```

---

## Document 2 — Concrete Examples

```sql
-- RULE 1 EXAMPLE: Window Function with GROUP BY

-- BAD: ws_ext_sales_price is raw, not in GROUP BY
SELECT cd_gender, wp_type, COUNT(*),
  SUM(ws.ws_ext_sales_price) OVER (PARTITION BY cd_gender ORDER BY wp_type) AS running_sum
FROM ... GROUP BY cd_gender, wp_type;
-- Error: MISSING_AGGREGATION on ws_ext_sales_price

-- GOOD: double-aggregate pattern
SELECT cd_gender, wp_type, COUNT(*),
  SUM(SUM(ws.ws_ext_sales_price)) OVER (PARTITION BY cd_gender ORDER BY wp_type) AS running_sum
FROM ... GROUP BY cd_gender, wp_type;
```

```sql
-- RULE 2 EXAMPLE: Non-Aggregated Scalar Expression Alongside Aggregates

-- BAD: ELEMENT_AT references raw columns alongside COUNT(*)
SELECT COUNT(*),
  ELEMENT_AT(ARRAY(cr.cr_returning_customer_sk, cs.cs_item_sk), 1) AS first_el
FROM catalog_returns cr, catalog_sales cs;
-- Error: MISSING_GROUP_BY

-- GOOD option A: wrap column references in MAX()
SELECT COUNT(*),
  ELEMENT_AT(ARRAY(MAX(cr.cr_returning_customer_sk), MAX(cs.cs_item_sk)), 1) AS first_el
FROM catalog_returns cr, catalog_sales cs;

-- GOOD option B: use only constants inside ELEMENT_AT
SELECT COUNT(*), ELEMENT_AT(ARRAY(1, 2, 3), 2) AS second_el
FROM catalog_returns cr, catalog_sales cs;
```

```sql
-- RULE 3 EXAMPLE: NVL2 on Non-Grouped Column

-- BAD: ss_net_paid is not a GROUP BY ROLLUP key
SELECT hd_buy_potential, d_year,
  NVL2(ss.ss_net_paid, 'has_value', 'is_null') AS net_paid_status
FROM ... GROUP BY ROLLUP (hd_buy_potential, d_year);
-- Error: MISSING_AGGREGATION on ss_net_paid

-- GOOD: wrap the column in an aggregate
SELECT hd_buy_potential, d_year,
  NVL2(MAX(ss.ss_net_paid), 'has_value', 'is_null') AS net_paid_status
FROM ... GROUP BY ROLLUP (hd_buy_potential, d_year);
```

```sql
-- RULE 4 EXAMPLE: JOIN Forward Reference

-- BAD: cr is used in ON clause before it is defined
FROM customer_demographics cd
JOIN customer c         ON cr.cr_returning_customer_sk = c.c_customer_sk
JOIN catalog_returns cr ON cr.cr_refunded_cdemo_sk = cd.cd_demo_sk;
-- Error: UNRESOLVED_COLUMN cr.cr_returning_customer_sk

-- GOOD: define cr before referencing it
FROM customer_demographics cd
JOIN catalog_returns cr ON cr.cr_refunded_cdemo_sk = cd.cd_demo_sk
JOIN customer c         ON cr.cr_returning_customer_sk = c.c_customer_sk;
```

```sql
-- RULE 5 EXAMPLE: Date Surrogate Key with Date Functions

-- BAD: wr_returned_date_sk is BIGINT, not DATE
DATE_ADD(MAX(CAST(wr.wr_returned_date_sk AS DATE)), 7) AS plus7
-- Error: cannot cast BIGINT to DATE

-- BAD: DATE_TRUNC on surrogate key cast to STRING
DATE_TRUNC('month', CAST(ss.ss_sold_date_sk AS STRING))
-- Error: CAST_INVALID_INPUT — '2451825' cannot be cast to TIMESTAMP

-- GOOD: use DATE_FROM_UNIX_DATE for integer day-offset keys
DATE_ADD(DATE_FROM_UNIX_DATE(MAX(wr.wr_returned_date_sk)), 7) AS plus7
DATE_TRUNC('month', DATE_FROM_UNIX_DATE(ss.ss_sold_date_sk))

-- ALSO GOOD: d_date is an actual DATE column, CAST is allowed
DATE_ADD(MAX(d.d_date), 7) AS plus7
```

```sql
-- RULE 6 EXAMPLE: FORMAT_NUMBER Output Cast to Numeric

-- BAD: FORMAT_NUMBER returns '1,234.56' — comma breaks CAST
HAVING CAST(FORMAT_NUMBER(SUM(cs_net_paid), 2) AS DOUBLE) > 0
-- Error: cannot cast '1,234.56' to DOUBLE

-- GOOD: compare the numeric value directly
HAVING SUM(cs_net_paid) > 0

-- ALSO GOOD: strip commas before casting if string form is needed
TRY_CAST(REPLACE(FORMAT_NUMBER(SUM(cs_net_paid), 2), ',' , '') AS DOUBLE)
```

```sql
-- RULE 7 EXAMPLE: Inconsistent STRUCT Field Names in ARRAY

-- BAD: STRUCT derives field names from expressions — they differ per element
MAP_FROM_ENTRIES(ARRAY(
  STRUCT('page_id',   wp.wp_web_page_id),           -- fields: col1, wp_web_page_id
  STRUCT('page_type', COALESCE(wp.wp_type, '?')),   -- fields: col1, col2         <- mismatch
  STRUCT('autogen',   wp.wp_autogen_flag)            -- fields: col1, wp_autogen_flag <- mismatch
))
-- Error: DATA_DIFF_TYPES

-- GOOD: use named_struct with identical, explicit field names
MAP_FROM_ENTRIES(ARRAY(
  named_struct('key', 'page_id',   'val', wp.wp_web_page_id),
  named_struct('key', 'page_type', 'val', COALESCE(wp.wp_type, '?')),
  named_struct('key', 'autogen',   'val', wp.wp_autogen_flag)
))
```

```sql
-- RULE 8 EXAMPLE: Unrestricted Semijoin on Large Table

-- BAD: full scan of store_sales with no filter
WHERE i.i_item_sk IN (SELECT ss_item_sk FROM store_sales)
-- Error: query exceeded 50.0s timeout

-- GOOD: add a selective filter to the subquery
WHERE i.i_item_sk IN (
  SELECT ss_item_sk FROM store_sales
  WHERE ss_net_paid > 0
    AND ss_sold_date_sk BETWEEN 2451000 AND 2452000
)
```

```sql
-- RULE 9 EXAMPLE: Non-Deterministic Function Inside Aggregate

-- BAD: RANDN() inside SUM — non-deterministic expression in aggregate
SUM(RANDN(42) * cs.cs_net_paid_inc_ship_tax) AS noisy_sum
-- Error: AGGREGATE_FUNCTION_WITH_NONDETERMINISTIC_EXPRESSION

-- BAD: RANDN() inside AVG
AVG(RANDN(0) + cs.cs_ext_ship_cost) AS noisy_avg

-- BAD: RANDN() inside CASE inside AVG
AVG(CASE WHEN i.i_class_id = 1
         THEN cs.cs_net_paid * (1 + RANDN(99) * 0.01)
         ELSE NULL END) AS conditional_noisy_avg

-- GOOD: aggregate only deterministic expressions
SUM(cs.cs_net_paid_inc_ship_tax) AS clean_sum

-- GOOD: use RANDN() in scalar position (not inside an aggregate)
SELECT RANDN(42) AS noise_value, SUM(col) AS total FROM t
```

```sql
-- RULE 10 EXAMPLE: LATERAL VIEW Column Alias Reference

-- BAD: 'pe' is not the defined table alias — table alias is 'pe_table'
FROM customer_demographics cd, web_page wp, web_sales ws, customer c
LATERAL VIEW POSEXPLODE(ARRAY(10, 20, 30)) pe_table AS pos, val
...
SUM(pe.pos) AS sum_pos
-- Error: UNRESOLVED_COLUMN pe.pos — Did you mean pe_table.pos?

-- GOOD: use the correct table alias prefix
SUM(pe_table.pos) AS sum_pos

-- ALSO GOOD: use the bare column name directly
SUM(pos) AS sum_pos
```
